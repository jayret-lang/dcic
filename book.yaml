          - { number: "18.3", title: "Union-Find",                       file: union-find.html }
          - { number: "18.4", title: "Hashes, Sets, and Key-Values",     file: hash-set-kv.html }
          - { number: "18.5", title: "Equality, Ordering, and Hashing",  file: orderability.html }
          - { number: "18.6", title: "Sets as a Case Study",             file: sets-case-study.html }

