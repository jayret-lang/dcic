name: Check links

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          pip install pyyaml
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build site
        env:
          PANDOC: pandoc
        run: python3 build.py --all

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.sha }}
          restore-keys: lychee-cache-

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # --insecure skips TLS cert verification.  Several legitimate
          # citations (Brown CS hosts) currently serve expired certs; we
          # are checking link availability, not security.
          #
          # --exclude patterns for anchors that exist in Scribble's output
          # but have no equivalent in our plain-HTML build:
          #   %28elem._   — cross-refs to named code figures (Scribble `elem`)
          #   struct.traverse.element — deep Scribble template subsection IDs
          #     generated from code-template walk-through sections; those
          #     subsections don't map to standalone headings in our build.
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --max-concurrency 4
            --insecure
            --include-fragments
            --exclude '%28elem\._'
            --exclude 'struct.traverse.element'
            'docs/**/*.html'
          fail: true
