name: Check links

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          pip install pyyaml
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build site
        env:
          PANDOC: pandoc
        run: python3 build.py --all

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.sha }}
          restore-keys: lychee-cache-

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # --include-fragments validates `page.html#anchor` references against
          # the actual anchors in the target HTML — the main reason we run this,
          # since the migration has reshuffled many heading IDs.
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --max-concurrency 4
            --include-fragments
            'docs/**/*.html'
          fail: true
