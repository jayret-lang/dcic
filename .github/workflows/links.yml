name: Check links

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          pip install pyyaml
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build site
        env:
          PANDOC: pandoc
        run: python3 build.py --all

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.sha }}
          restore-keys: lychee-cache-

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # NOTE: --include-fragments is intentionally OFF.  Enabling it
          # surfaces ~1020 pre-existing broken anchors in TOC/cross-refs
          # caused by a Scribble-encoding mismatch carried over from the
          # upstream DCIC: hrefs use the dotted form
          # `#(part._.A_.First_.Example)` but the `<a name=...>` anchors
          # in the target HTML use the hyphenated form
          # `(part._A-First-Example)`.  Tracked in PARITY.md.
          # Re-enable once that mismatch is fixed in the templates / Lua
          # filter or via a post-build rewrite.
          # `--exclude` skips a few external hosts that currently serve
          # expired TLS certs (Brown CS).  Drop these once the certs are
          # renewed upstream.
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --max-concurrency 4
            --exclude 'papl\.cs\.brown\.edu'
            --exclude 'world\.cs\.brown\.edu'
            --exclude 'greatachievements\.org'
            'docs/**/*.html'
          fail: true
